
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>C‑Test Introduction</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root { --maxw: 900px; --accent: #1976d2; }
  body {
    font-family: Arial, sans-serif;
    margin: 40px;
    line-height: 1.6;
    max-width: 900px;
  }
  h2 { margin-top: 40px; }
  input[type="text"] {
    width: 40px;
    font-size: 1rem;
    margin: 0 0px;
    padding: 2px 6px;
    border: 2px solid #bbb;
    border-radius: 4px;
  }
  .ctest-pair {
    white-space: nowrap;
    display: inline-flex;
    align-items: baseline;
	  }
  h1 { margin: 0 0 10px 0; }
  p.muted { color: #555; margin-top: 6px; }
  /* Keep the visible prefix + input together on one line */
  .ctest-pair {
    white-space: nowrap;
    display: inline-flex;
    align-items: baseline;
  }
  input[type="text"] {
    width: 40px;     /* adjust as desired */
    max-width: 600px;
    font-size: 1rem;
    margin: 0 0px;
    padding: 2px 6px;
    border: 2px solid #bbb;
    border-radius: 4px;
    transition: background-color .15s ease, border-color .15s ease;
  }
  /* Feedback colors */
  .correct   { background: #e8f5e9; border-color: #2e7d32; }
  .incorrect { background: #ffebee; border-color: #c62828; }
  button {
    margin-top: 12px;
    padding: 10px 18px;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
  }
  button.secondary {
    background: #fff;
    color: var(--accent);
  }
  #practice_status {
    margin-top: 10px;
    font-weight: bold;
  }
  hr { margin: 22px 0; }
	
	  /* How far to indent the reading content to clear the left strip */
  :root { --accent-strip-offset: 5rem; }

  /* Applied to an auto-created wrapper around the reading content */
  .content-indented {
    padding-left: var(--accent-strip-offset);
  }
	
</style>
	
</head>
<body>

<h1>Spanish C-Test</h1>

<p>	Please enter the experiment ID and participant ID and click the button below. 
</p>
	
		
<!-- Password field -->
<p class="inline">
  <label for="pwd"><strong>Experiment ID:</strong></label>
  <input type="text" id="pwd" placeholder="Enter the experiment ID" required autocomplete="off" aria-describedby="pwd_hint">
</p>
	
	<!-- Participant ID -->
<p><strong>Participant ID:</strong>
  <input type="text" id="pid" placeholder="Enter your ID" required autocomplete="off">
</p>



	
<!-- Start test button -->
	
<button id="btn_start_test" type="button" style="margin-top:20px;">
  Start C-test
</button>
	<div id="practice_status"></div>
		
	
<script>
	
/* Set default attributes on all C-test blanks */
document.querySelectorAll('.ctest-pair input').forEach(input => {
  input.type = "text";
  input.autocomplete = "off";
});
	


/* ---- Move to next page with Participant ID preserved ---- */
const REQUIRED_PASSWORD = "261";
	
	const NEXT_PAGE_URL = "intro1.html";   

function normalizeForCompare(str) {
  return (str || "")
    .toLowerCase()    // case-insensitive
    .replace(/\s+/g, ""); // remove ALL whitespace (spaces, tabs, newlines)
}

	function isValidPID(rawPID) {
  const cleaned = rawPID.replace(/\s+/g, ""); // remove all spaces
  const num = Number(cleaned);

  // must be exactly 3 digits AND between 000–999
  return /^\d{3}$/.test(cleaned) && num >= 000 && num <= 999;
}

document.getElementById("btn_start_test").addEventListener("click", () => {
  const pidField = document.getElementById("pid");
  const pwdField = document.getElementById("pwd");
  const pid = (pidField.value || "").trim();
  const status = document.getElementById("practice_status");

  if (!pid) {
    status.textContent = "⚠️ Please enter your Participant ID before starting the test.";
    pidField.focus();
    return;
  }
// Check PID validity
if (!isValidPID(pid)) {
  status.textContent = "⛔ Invalid Participant ID. Please check with the experimenter.";
  pidField.focus();
  return;
}
  const userPwdNorm = normalizeForCompare(pwdField.value);
  const requiredPwdNorm = normalizeForCompare(REQUIRED_PASSWORD);

  if (!userPwdNorm) {
    status.textContent = "⚠️ Please enter the experiment ID to continue.";
    pwdField.focus();
    return;
  }
  if (userPwdNorm !== requiredPwdNorm) {
    status.textContent = "⛔ Incorrect experiment ID. Please check with the experimenter.";
    pwdField.focus();
    pwdField.select();
    return;
  }

  const target = `${NEXT_PAGE_URL}?pid=${encodeURIComponent(pid)}`;
  window.location.href = target;
});

</script>
	



</body>
	
</html>
