<!-- ====== Base styles aligned with test.html ====== -->

<!-- ====== Page Guard: only allow entry from index.html ====== -->
<script>
(function guardIntro2() {
  const redirectToIndex = () => { window.location.replace("index.html"); };

  try {
    const cameFromIntro = sessionStorage.getItem("cameFromIntro") === "1";
    const ref = document.referrer || "";
    const refLooksRight =
      ref.endsWith("/index.html") ||
      ref.includes("/index.html") ||
      ref.endsWith("index.html") ||
      ref.includes("index.html");
    const refOkay = (ref === "") ? true : refLooksRight;

    if (!cameFromIntro || !refOkay) {
      redirectToIndex();
      return;
    }
    // One-time token to prevent reload/bookmark bypass
    sessionStorage.removeItem("cameFromIntro");
  } catch (e) {
    const ref = document.referrer || "";
    const refLooksRight =
      ref.endsWith("/index.html") ||
      ref.includes("/index.html") ||
      ref.endsWith("index.html") ||
      ref.includes("index.html");
    if (!refLooksRight) {
      redirectToIndex();
      return;
    }
  }
})();
</script>
</head>
<body>

<noscript>
  <p class="muted">
    JavaScript is required to continue. Please enable JavaScript and return to
    <a href="index.html">the introduction page</a>.
  </p>
</noscript>

<h1>Spanish C-Test</h1>

<!-- ====== Content block that matches test.html's right offset via wrapper (added below) ====== -->
<div id="intro2ContentStart" aria-hidden="true" style="height:0;width:0;overflow:hidden;"></div>

<p>
  This is not a timed test. If you do not know an answer, you can make a guess or leave the answer blank.
</p>

<p>
  When you are ready to begin, enter the participant ID and password the experimenter gave you and click the button below.
</p>

<!-- Participant ID -->
<p><strong>Participant ID:</strong>
  <input type="text" id="pid" placeholder="Enter your ID" required autocomplete="off">
</p>

<!-- Password field -->
<p class="inline">
  <label for="pwd"><strong>Password:</strong></label>
  <input type="text" id="pwd" placeholder="Enter the password provided by the experimenter" required autocomplete="off" aria-describedby="pwd_hint">
</p>

<!-- Start test button -->
<button id="btn_start_test" type="button" style="margin-top:20px;">
  Start C-test
</button>

<div id="login_status" role="status" aria-live="polite"></div>

<!-- ========= Start button logic (unchanged) ========= -->
<script>
/* ---- Config ---- */
const REQUIRED_PASSWORD = "spanish@depaul";
const NEXT_PAGE_URL = "test.html";   // <-- Replace with your real next page

function normalizeForCompare(str) {
  return (str || "")
    .toLowerCase()
    .replace(/\s+/g, "");
}

function isValidPID(rawPID) {
  const cleaned = (rawPID || "").replace(/\s+/g, "");
  const num = Number(cleaned);
  return /^\d{3}$/.test(cleaned) && num >= 0 && num <= 999;
}

document.getElementById("btn_start_test").addEventListener("click", () => {
  const pidField = document.getElementById("pid");
  const pwdField = document.getElementById("pwd");
  const pid = (pidField.value || "").trim();
  const status = document.getElementById("login_status");

  if (!pid) {
    status.textContent = "⚠️ Please enter your Participant ID before starting the test.";
    pidField.focus();
    return;
  }
  if (!isValidPID(pid)) {
    status.textContent = "⛔ Invalid Participant ID. Please check with the experimenter.";
    pidField.focus();
    return;
  }

  const userPwdNorm = normalizeForCompare(pwdField.value);
  const requiredPwdNorm = normalizeForCompare(REQUIRED_PASSWORD);

  if (!userPwdNorm) {
    status.textContent = "⚠️ Please enter the password to continue.";
    pwdField.focus();
    return;
  }
  if (userPwdNorm !== requiredPwdNorm) {
    status.textContent = "⛔ Incorrect password. Please check with the experimenter.";
    pwdField.focus();
    pwdField.select();
    return;
  }

  const target = `${NEXT_PAGE_URL}?pid=${encodeURIComponent(pid)}`;
  window.location.href = target;
});
</script>

<!-- ===================== ACCENT STRIP (left pinned) ===================== -->
<style>
  /* Container pinned to left (copied from test.html) */
  .accent-strip {
    position: fixed;
    left: 0.75rem;
    top: 30%;
    transform: translateY(-30%);
    z-index: 9999;
    background: #ffffff;
    border: 1px solid #ccc;
    border-radius: .5rem;
    box-shadow: 0 6px 18px rgba(0,0,0,.15);
    padding: .5rem;
    width: 2.6rem;
    user-select: none;
    font-family: Arial, sans-serif;
  }

  .accent-strip-header {
    text-align: center;
    font-size: .75rem;
    color: #555;
    margin: 0 0 .25rem 0;
    line-height: 1.1;
  }

  .accent-strip-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: .25rem;
    justify-items: stretch;
  }

  .accent-strip .accent-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 2.1rem;
    border-radius: .4rem;
    border: 1px solid #ddd;
    background: #f7f7f7;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    transition: background .15s, transform .02s;

    margin-top: 0 !important;
    padding: 0 !important;
    font-weight: normal;
  }
  .accent-strip .accent-btn:hover { background: #eee; }
  .accent-strip .accent-btn:active { transform: translateY(1px); }

  @media (max-width: 480px) {
    .accent-strip {
      left: .5rem;
      top: 40%;
      width: 2.8rem;
    }
    .accent-strip .accent-btn {
      height: 2.3rem;
      font-size: 1.2rem;
    }
  }
</style>

<div id="accentStrip" class="accent-strip" role="group" aria-label="Spanish accent strip">
  <div class="accent-strip-header" aria-hidden="true">Acentos</div>
  <div class="accent-strip-grid">
    <button type="button" class="accent-btn" data-char="á" aria-label="insert á">á</button>
    <button type="button" class="accent-btn" data-char="é" aria-label="insert é">é</button>
    <button type="button" class="accent-btn" data-char="í" aria-label="insert í">í</button>
    <button type="button" class="accent-btn" data-char="ó" aria-label="insert ó">ó</button>
    <button type="button" class="accent-btn" data-char="ú" aria-label="insert ú">ú</button>
    <button type="button" class="accent-btn" data-char="ü" aria-label="insert ü">ü</button>
    <button type="button" class="accent-btn" data-char="ñ" aria-label="insert ñ">ñ</button>
  </div>
</div>

<script>
  // Accent strip behavior (same self-contained logic pattern as test.html)
  (function () {
    let lastFocused = null;

    // For intro2, we want the palette to insert into text inputs on this page (pid, pwd)
    function isEligible(el) {
      return el && el.matches('input[type="text"]') && !el.disabled && !el.readOnly;
    }

    function trackTargets() {
      document.querySelectorAll('input[type="text"]').forEach(el => {
        el.addEventListener('focus', () => { lastFocused = el; }, { capture: true });
        el.addEventListener('click', () => { lastFocused = el; }, { capture: true });
      });
      document.addEventListener('focusin', (e) => {
        const t = e.target;
        if (t && t.matches && t.matches('input[type="text"]')) lastFocused = t;
      });
    }

    function insertAtCaret(el, char) {
      if (!isEligible(el)) return;
      el.focus({ preventScroll: false });
      if (typeof el.setRangeText === 'function') {
        const start = el.selectionStart ?? el.value.length;
        const end   = el.selectionEnd ?? el.value.length;
        el.setRangeText(char, start, end, 'end'); // caret after char
        el.dispatchEvent(new Event('input', { bubbles: true }));
        return;
      }
      // Fallback
      const start = el.selectionStart || 0;
      const end   = el.selectionEnd || 0;
      const before = el.value.slice(0, start);
      const after  = el.value.slice(end);
      el.value = before + char + after;
      const newPos = start + char.length;
      if (el.setSelectionRange) el.setSelectionRange(newPos, newPos);
      el.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function bindStrip() {
      const strip = document.getElementById('accentStrip');
      strip.addEventListener('click', (e) => {
        const btn = e.target.closest('.accent-btn[data-char]');
        if (!btn) return;

        if (!isEligible(lastFocused)) {
          // default to PID field first, then password field
          lastFocused =
            document.getElementById('pid') ||
            document.getElementById('pwd') ||
            null;
        }
        if (isEligible(lastFocused)) insertAtCaret(lastFocused, btn.dataset.char);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      trackTargets();
      bindStrip();
    });
  })();
</script>
<!-- =================== /ACCENT STRIP =================== -->

<!-- ================= Right indent wrapper (same approach as test.html) ================= -->
<style>
  /* Indent content to clear the accent strip */
  :root { --accent-strip-offset: 5rem; }
  .content-indented {
    padding-left: var(--accent-strip-offset);
  }
</style>

<script>
  // Wrap from our invisible #intro2ContentStart marker up to (but not including) the Start button
  // so the visible content shifts right and doesn't collide with the left strip.
  document.addEventListener('DOMContentLoaded', () => {
    try {
      const start = document.getElementById('intro2ContentStart');
      const endMarker = document.getElementById('btn_start_test');
      if (!start || !endMarker) return;

      const wrapper = document.createElement('div');
      wrapper.className = 'content-indented';

      // Insert wrapper right after the marker
      start.parentNode.insertBefore(wrapper, start.nextSibling);

      // Move nodes from after marker up to endMarker (exclusive) into the wrapper
      let node = wrapper.nextSibling;
      while (node && node !== endMarker) {
        const next = node.nextSibling;
        wrapper.appendChild(node);
        node = next;
      }
    } catch (e) {
      console.warn('Indent wrapper setup skipped due to error:', e);
    }
  });
</script>

</body>
</html>
