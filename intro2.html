<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>C‑Test Introduction (Step 2)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root { --maxw: 900px; --accent: #1976d2; }
  body {
    font-family: Arial, sans-serif;
    margin: 40px auto;
    line-height: 1.6;
    max-width: var(--maxw);
    padding: 0 12px;
  }
  h1 { margin: 0 0 10px 0; }
  button {
    margin-top: 12px;
    padding: 10px 18px;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
  }
  #login_status {
    margin-top: 10px;
    font-weight: bold;
  }
  #pwd { width: 370px; }
  hr { margin: 22px 0; }
  .inline label { display: inline-block; margin-right: 6px; }
  input[type="text"] {
    font-size: 1rem;
    padding: 6px 8px;
    border: 2px solid #bbb;
    border-radius: 4px;
  }
  .muted {
    color: #666;
    font-size: 0.95rem;
  }
  noscript a { color: var(--accent); }
</style>

<script>
/* ---------- Page Guard: only allow entry from index.html ---------- */
(function guardIntro2() {
  const redirectToIndex = () => { window.location.replace("index.html"); };

  try {
    const cameFromIntro = sessionStorage.getItem("cameFromIntro") === "1";
    // Best-effort referrer check (may be empty due to privacy settings)
    const ref = document.referrer || "";
    const refLooksRight =
      ref.endsWith("/index.html") ||
      ref.includes("/index.html") ||
      ref.endsWith("index.html") ||
      ref.includes("index.html");

    // Require session flag; also prefer referrer to match when present
    const refOkay = (ref === "") ? true : refLooksRight;

    if (!cameFromIntro || !refOkay) {
      redirectToIndex();
      return;
    }

    // One-time token: clear immediately to prevent reload/bookmark bypass
    sessionStorage.removeItem("cameFromIntro");
  } catch (e) {
    // If storage is blocked, fall back strictly to referrer (may still fail in strict privacy contexts)
    const ref = document.referrer || "";
    const refLooksRight =
      ref.endsWith("/index.html") ||
      ref.includes("/index.html") ||
      ref.endsWith("index.html") ||
      ref.includes("index.html");
    if (!refLooksRight) {
      redirectToIndex();
      return;
    }
  }
})();
</script>
</head>
<body>

<noscript>
  <p class="muted">
    JavaScript is required to continue. Please enable JavaScript and return to
    <a href="index.html">the introduction page</a>.
  </p>
</noscript>

<h1>Spanish C-Test</h1>

<p>
  This is not a timed test. If you do not know an answer, you can make a guess or leave the answer blank.
</p>

<p>
  When you are ready to begin, enter the participant ID and password the experimenter gave you and click the button below.
</p>

<!-- Participant ID -->
<p><strong>Participant ID:</strong>
  <input type="text" id="pid" placeholder="Enter your ID" required autocomplete="off">
</p>

<!-- Password field -->
<p class="inline">
  <label for="pwd"><strong>Password:</strong></label>
  <input type="text" id="pwd" placeholder="Enter the password provided by the experimenter" required autocomplete="off" aria-describedby="pwd_hint">
</p>

<!-- Start test button -->
<button id="btn_start_test" type="button" style="margin-top:20px;">
  Start C-test
</button>

<div id="login_status" role="status" aria-live="polite"></div>

<script>
/* ---- Config ---- */
const REQUIRED_PASSWORD = "spanish@depaul";
const NEXT_PAGE_URL = "test.html";   // <-- Replace with your real next page

function normalizeForCompare(str) {
  return (str || "")
    .toLowerCase()
    .replace(/\s+/g, "");
}

function isValidPID(rawPID) {
  const cleaned = (rawPID || "").replace(/\s+/g, "");
  const num = Number(cleaned);
  return /^\d{3}$/.test(cleaned) && num >= 0 && num <= 999;
}

/* Start button logic */
document.getElementById("btn_start_test").addEventListener("click", () => {
  const pidField = document.getElementById("pid");
  const pwdField = document.getElementById("pwd");
  const pid = (pidField.value || "").trim();
  const status = document.getElementById("login_status");

  if (!pid) {
    status.textContent = "⚠️ Please enter your Participant ID before starting the test.";
    pidField.focus();
    return;
  }
  if (!isValidPID(pid)) {
    status.textContent = "⛔ Invalid Participant ID. Please check with the experimenter.";
    pidField.focus();
    return;
  }

  const userPwdNorm = normalizeForCompare(pwdField.value);
  const requiredPwdNorm = normalizeForCompare(REQUIRED_PASSWORD);

  if (!userPwdNorm) {
    status.textContent = "⚠️ Please enter the password to continue.";
    pwdField.focus();
    return;
  }
  if (userPwdNorm !== requiredPwdNorm) {
    status.textContent = "⛔ Incorrect password. Please check with the experimenter.";
    pwdField.focus();
    pwdField.select();
    return;
  }

  const target = `${NEXT_PAGE_URL}?pid=${encodeURIComponent(pid)}`;
  window.location.href = target;
});
</script>

</body>
</html>
